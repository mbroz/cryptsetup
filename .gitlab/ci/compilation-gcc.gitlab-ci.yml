test-gcc-compilation:
  extends:
    - .gitlab-shared-docker
  script:
    - CFLAGS="-Wall -Werror" ./configure --enable-cryptsetup-reencrypt --enable-pwquality --enable-libargon2
    - make -j

test-gcc-Wall-script:
  extends:
    - .gitlab-shared-docker
  script:
    - export CFLAGS="-g -O0"
    - export CC=".gitlab/ci/gcc-Wall"
    - ./configure --enable-cryptsetup-reencrypt --enable-pwquality --enable-libargon2
    - make -j

test-gcc-fanalyzer:
  extends:
    - .gitlab-shared-docker
  script:
    - CFLAGS="-Wall -Werror -fanalyzer" ./configure --enable-cryptsetup-reencrypt --enable-pwquality --enable-libargon2
    - make -j
